<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Favicon ── -->
  <link rel="icon" type="image/png" href="/Romar_Logo.png?v=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">


  <!-- ── Primary Meta ── -->
  <title>Roamr — AI Travel Planner</title>
  <meta name="title" content="Roamr — AI Travel Planner" />
  <meta name="description"
    content="Plan your perfect trip in seconds. Roamr builds a complete day-by-day itinerary — hotels, food, attractions and budget — for any destination in the world." />
  <meta name="keywords"
    content="travel planner, AI itinerary, trip planner, India travel, holiday planner, travel guide, Roamr" />

  <meta name="theme-color" content="#0D1E2D" />

  <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn preview) ── -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://roamr-travel-planner.vercel.app/" />
  <meta property="og:title" content="Roamr — AI Travel Planner" />
  <meta property="og:description"
    content="Your next trip, already planned. Get a complete day-by-day itinerary for any destination in under 2 minutes. Free forever." />
  <meta property="og:image" content="https://roamr-travel-planner.vercel.app/og-image.png" />
  <meta property="og:site_name" content="Roamr" />
  <meta property="og:locale" content="en_IN" />

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://roamr-travel-planner.vercel.app/" />
  <meta name="twitter:title" content="Roamr — AI Travel Planner" />
  <meta name="twitter:description"
    content="Your next trip, already planned. Get a complete day-by-day itinerary for any destination in under 2 minutes." />
  <meta name="twitter:image" content="https://roamr-travel-planner.vercel.app/og-image.png" />
  
  <!-- ── Preconnect for faster font loading ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ── Loading screen style (shows before React mounts) ── -->
  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      background: #F8F4EE;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #app-loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #app-loading svg {
      animation: loadingFloat 2s ease-in-out infinite;
    }

    #app-loading p {
      font-family: system-ui, sans-serif;
      font-size: 0.9rem;
      color: #7A6E67;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #app-loading .dot-trail {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #app-loading .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #F4845F;
      animation: loadingDot 1.2s ease-in-out infinite;
    }

    #app-loading .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    #app-loading .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes loadingFloat {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes loadingDot {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- ── Loading screen — fades out once React mounts ── -->
  <div id="app-loading">
    <svg width="52" height="52" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="40" height="40" rx="12" fill="#152D44" />
      <ellipse cx="20" cy="20" rx="11" ry="11" stroke="rgba(255,255,255,0.22)" stroke-width="1.3" fill="none" />
      <path d="M9 20 Q20 14 31 20" stroke="rgba(255,255,255,0.18)" stroke-width="1.1" fill="none" />
      <path d="M20 9 Q14 20 20 31" stroke="rgba(255,255,255,0.18)" stroke-width="1.1" fill="none" />
      <g transform="translate(13,12) rotate(-30 7 7)">
        <path d="M0 7 L14 0 L10 14 L6 9 Z" fill="white" fill-opacity="0.95" />
        <path d="M6 9 L10 14 L8 10 Z" fill="#F4845F" fill-opacity="0.9" />
      </g>
      <circle cx="9" cy="27" r="1.1" fill="#F4845F" fill-opacity="0.85" />
      <circle cx="13" cy="29" r="0.85" fill="#F4845F" fill-opacity="0.6" />
      <circle cx="17" cy="30" r="0.65" fill="#F4845F" fill-opacity="0.4" />
    </svg>
    <div class="dot-trail">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- ── Fade out loading screen once React mounts ── -->
  <script>
    // Remove loading screen after React has had time to render
    window.addEventListener('load', function () {
      setTimeout(function () {
        var loader = document.getElementById('app-loading');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function () { loader.remove(); }, 400);
        }
      }, 300);
    });
  </script>
</body>

</html>
